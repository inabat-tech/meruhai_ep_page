<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>める配プロプラン | 自動追客で「本顧客」へ導く</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #4a82e8;
            --accent-orange: #f39800;
            --text-main: #333;
            --bg-light: #fdfdfd;
        }
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 0; color: var(--text-main); line-height: 1.6; background: #fff; }

        /* --- ヘッダー（公式サイト再現） --- */
        .site-header { background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; padding: 10px 0; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-logo img { height: 45px; }
        .header-nav { display: flex; align-items: center; gap: 20px; }
        .header-nav a { text-decoration: none; color: var(--text-main); font-size: 14px; font-weight: bold; }
        .header-cta-top { background: var(--accent-orange); color: #fff !important; padding: 8px 15px; border-radius: 4px; }

        /* --- ファーストビュー (FV) --- */
        .fv { padding: 60px 20px; max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; align-items: flex-start; }
        
        .fv-left { flex: 1; min-width: 350px; padding-right: 40px; }
        .fv-sub-copy { color: var(--accent-orange); font-weight: bold; font-size: 1.1rem; margin-bottom: 15px; }
        .fv-main-copy { color: var(--primary-blue); font-size: 2.8rem; font-weight: bold; line-height: 1.3; margin-bottom: 30px; }
        .fv-description { font-size: 1.1rem; color: #666; margin-bottom: 40px; max-width: 450px; }

        /* キャラクター配置 */
        .char-area { margin-top: 30px; text-align: left; }
        .char-img { width: 180px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); }

        /* 右側：ステップ図解（画像2枚目の再現） */
        .fv-right { flex: 1.2; min-width: 500px; }
        .step-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: center; }
        
        .step-title { font-size: 0.8rem; font-weight: bold; color: #888; margin-bottom: 15px; grid-column: span 3; }
        
        /* 縦のフロー */
        .flow-col { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        .box-form { background: #e0e0e0; padding: 15px 5px; border-radius: 10px; width: 100%; font-size: 0.8rem; font-weight: bold; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        .arrow-down { color: #ccc; font-size: 1.2rem; }
        
        /* メールアイコン */
        .mail-stack { display: flex; flex-direction: column; gap: 5px; width: 100%; }
        .mail-item { padding: 10px; border-radius: 4px; color: #fff; font-size: 1rem; }
        .mail-blue { background: #4a82e8; }
        .mail-light-blue { background: #eef5ff; color: #4a82e8; border: 1px solid #ddecff; }
        .mail-orange { background: #ffbe76; }

        /* ハンドシェイク */
        .handshake-img { width: 80px; margin-top: 10px; }

        /* CTAエリア */
        .cta-area { display: flex; gap: 15px; margin-top: 50px; }
        .btn-large { flex: 1; padding: 18px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 1.2rem; transition: 0.3s; text-align: center; border: none; cursor: pointer; }
        .btn-blue { background: #4a82e8; color: #fff; box-shadow: 0 4px 10px rgba(74, 130, 232, 0.3); }
        .btn-outline { border: 2px solid #4a82e8; color: #4a82e8; background: #fff; }
        .btn-large:hover { opacity: 0.8; transform: translateY(-2px); }

        /* --- フッター（簡易再現） --- */
        .site-footer { background: #333; color: #fff; padding: 40px 20px; margin-top: 80px; text-align: center; }
        .copy { font-size: 0.8rem; color: #888; }

        @media (max-width: 900px) {
            .fv { flex-direction: column; text-align: center; }
            .fv-left { padding-right: 0; margin-bottom: 50px; }
            .fv-description { margin: 0 auto 40px; }
            .char-area { text-align: center; }
            .fv-right { min-width: 100%; }
            .cta-area { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-container">
            <div class="header-logo">
                <a href="https://www.meruhaikun.com/"><img src="https://www.meruhaikun.com/common/img/logo.png" alt="める配くん"></a>
            </div>
            <nav class="header-nav">
                <a href="https://www.meruhaikun.com/feature/">特徴</a>
                <a href="https://www.meruhaikun.com/price/">料金表</a>
                <a href="https://www.meruhaikun.com/trial/" class="header-cta-top">無料トライアル</a>
            </nav>
        </div>
    </header>

    <main class="fv">
        <div class="fv-left">
            <div class="fv-sub-copy">累計2500社の実績を誇る「める配くん」から、待望の新プラン誕生！</div>
            <h1 class="fv-main-copy">その「見込み客」、<br>プロプランなら<br>「本顧客」まで導ける。</h1>
            <p class="fv-description">複数の入り口（フォーム） × 自動追客（ステップメール）で、「売れるチャンス」を自動でつくる。</p>
            
            <div class="char-area">
                <img src="https://inabat-tech.github.io/meruhai_ep_page/sampo_speaker.png" alt="キャラクター" class="char-img">
            </div>

            <div class="cta-area">
                <a href="https://www.meruhaikun.com/trial/" class="btn-large btn-blue">今すぐ無料で始める</a>
                <a href="#" class="btn-large btn-outline">オンラインMtg予約</a>
            </div>
        </div>

        <div class="fv-right">
            <div class="step-container">
                <div class="step-title" style="margin-bottom: 0;">STEP1：フォーム作成</div>
                <div class="flow-col">
                    <div class="box-form">資料請求<br>フォーム</div>
                    <div class="arrow-down"><i class="fa-solid fa-arrow-down"></i></div>
                </div>
                <div class="flow-col">
                    <div class="box-form">セミナー<br>フォーム</div>
                    <div class="arrow-down"><i class="fa-solid fa-arrow-down"></i></div>
                </div>
                <div class="flow-col">
                    <div class="box-form">お問い合わせ<br>フォーム</div>
                    <div class="arrow-down"><i class="fa-solid fa-arrow-down"></i></div>
                </div>

                <div class="step-title" style="margin-top: 10px; margin-bottom: 0;">STEP2：ステップメールで「育てる」</div>
                <div class="flow-col">
                    <div class="mail-stack">
                        <div class="mail-item mail-blue"><i class="fa-solid fa-envelope"></i></div>
                        <div class="mail-item mail-blue"><i class="fa-solid fa-envelope"></i></div>
                        <div class="mail-item mail-blue"><i class="fa-solid fa-envelope"></i></div>
                    </div>
                    <div class="arrow-down"><i class="fa-solid fa-arrow-down"></i></div>
                </div>
                <div class="flow-col">
                    <div class="mail-stack">
                        <div class="mail-item mail-light-blue"><i class="fa-solid fa-envelope"></i></div>
                        <div class="mail-item mail-light-blue"><i class="fa-solid fa-envelope"></i></div>
                        <div class="mail-item mail-light-blue"><i class="fa-solid fa-envelope"></i></div>
                    </div>
                    <div class="arrow-down"><i class="fa-solid fa-arrow-down"></i></div>
                </div>
                <div class="flow-col">
                    <div class="mail-stack">
                        <div class="mail-item mail-orange"><i class="fa-solid fa-envelope"></i></div>
                        <div class="mail-item mail-orange"><i class="fa-solid fa-envelope"></i></div>
                        <div class="mail-item mail-orange"><i class="fa-solid fa-envelope"></i></div>
                    </div>
                    <div class="arrow-down"><i class="fa-solid fa-arrow-down"></i></div>
                </div>

                <div class="step-title" style="margin-top: 10px; margin-bottom: 0;">STEP3：本顧客へ「導く」</div>
                <div class="flow-col">
                    <img src="https://www.meruhaikun.com/common/img/case_illust01.png" alt="握手" class="handshake-img" style="filter: hue-rotate(180deg);">
                </div>
                <div class="flow-col">
                    <img src="https://www.meruhaikun.com/common/img/case_illust01.png" alt="握手" class="handshake-img" style="opacity: 0.5;">
                </div>
                <div class="flow-col">
                    <img src="https://www.meruhaikun.com/common/img/case_illust01.png" alt="握手" class="handshake-img" style="filter: saturate(2);">
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="copy">&copy; delightful Inc. All Rights Reserved.</div>
    </footer>

</body>
</html>
