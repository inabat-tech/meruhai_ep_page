<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>める配プロプラン | 自動追客で「本顧客」へ導くメール配信</title>
    <link rel="stylesheet" href="https://www.meruhaikun.com/common/css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* LP専用の追加スタイル */
        :root {
            --primary-color: #005bac;
            --accent-color: #f39800;
            --bg-light: #f8f9fa;
        }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; color: #333; line-height: 1.8; }
        
        /* 既存ヘッダーの微調整（LP用にシンプル化する場合） */
        #header { background: #fff; border-bottom: 1px solid #eee; padding: 10px 0; }
        .header-inner { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-btn-group { display: flex; gap: 10px; }
        
        /* コンバージョンボタン */
        .lp-btn { display: inline-block; padding: 18px 45px; border-radius: 50px; font-weight: bold; text-decoration: none; transition: 0.3s; margin: 10px; border: none; cursor: pointer; }
        .lp-btn-trial { background: var(--accent-color); color: #fff; font-size: 1.3rem; box-shadow: 0 4px 15px rgba(243, 152, 0, 0.4); }
        .lp-btn-mtg { background: #fff; color: var(--primary-color); border: 2px solid var(--primary-color); font-size: 1.1rem; }
        .lp-btn:hover { opacity: 0.8; transform: translateY(-2px); }

        /* セクション共通 */
        .lp-section { padding: 100px 0; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; text-align: center; }
        .section-title { font-size: 2.2rem; color: var(--primary-color); margin-bottom: 50px; position: relative; padding-bottom: 15px; }
        .section-title::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 60px; height: 3px; background: var(--accent-color); }

        /* メインビジュアル */
        .hero { background: linear-gradient(135deg, #eef5ff 0%, #fff 100%); padding: 120px 0; }
        .hero h1 { font-size: 2.8rem; color: var(--primary-color); line-height: 1.4; margin-bottom: 25px; }
        .hero .sub-text { font-size: 1.3rem; color: #555; margin-bottom: 45px; }

        /* 特徴カード */
        .feature-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; margin-top: 50px; }
        .feature-card { background: #fff; padding: 40px; border: 1px solid #e0e0e0; border-radius: 12px; transition: 0.3s; }
        .feature-card:hover { box-shadow: 0 15px 30px rgba(0,0,0,0.08); }
        .feature-card i { font-size: 3.5rem; color: var(--primary-color); margin-bottom: 25px; }
        .feature-card h3 { font-size: 1.4rem; margin-bottom: 15px; color: #333; }

        /* 既存のフッター調整 */
        #footer { background: #f4f4f4; padding: 60px 0 20px; border-top: 1px solid #ddd; }
        .footer-content { max-width: 1100px; margin: 0 auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 2fr; gap: 40px; text-align: left; }
        .footer-links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; font-size: 0.9rem; }
        .footer-links a { color: #666; text-decoration: none; }
        .copyright { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #ddd; font-size: 0.8rem; color: #999; }
    </style>
</head>
<body>

    <header id="header">
        <div class="header-inner">
            <div class="logo">
                <a href="https://www.meruhaikun.com/">
                    <img src="https://www.meruhaikun.com/common/img/logo.png" alt="める配くん" height="50">
                </a>
            </div>
            <div class="nav-btn-group">
                <a href="https://www.meruhaikun.com/trial/" class="lp-btn lp-btn-trial" style="padding: 10px 20px; font-size: 0.9rem; margin: 0;">無料トライアル</a>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>その「見込み客」、<br>プロプランなら「本顧客」へ導ける。</h1>
            <p class="sub-text">複数のフォーム作成 × 自動追客（ステップメール）で、<br>「成約のチャンス」を自動的に最大化します。</p>
            <div class="cta-area">
                <a href="https://www.meruhaikun.com/trial/" class="lp-btn lp-btn-trial">今すぐ無料で始める</a>
                <a href="#mtg" class="lp-btn lp-btn-mtg">オンラインMTGを予約する</a>
            </div>
        </div>
    </section>

    <section class="lp-section">
        <div class="container">
            <h2 class="section-title">プロプランが選ばれる理由</h2>
            <div class="feature-grid">
                <div class="feature-card">
                    <i class="fa-solid fa-envelope-circle-check"></i>
                    <h3>ステップメール</h3>
                    <p>登録日から「3日後」「7日後」など、スケジュールに合わせて自動配信。最適なタイミングでのアプローチを自動化します。</p>
                </div>
                <div class="feature-card">
                    <i class="fa-solid fa-window-restore"></i>
                    <h3>複数フォーム作成</h3>
