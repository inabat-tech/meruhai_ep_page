<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>める配プロプラン | 自動追客で「本顧客」へ導く</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #4a82e8;
            --accent-orange: #f39800;
            --text-main: #333;
            --step-bg: #f2f2f2;
        }
        body { font-family: 'Noto Sans JP', sans-serif; margin: 0; padding: 0; color: var(--text-main); line-height: 1.5; background: #fff; }

        /* --- ヘッダー --- */
        .site-header { background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; padding: 10px 0; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; }
        .header-logo img { height: 40px; }
        .header-nav { display: flex; align-items: center; gap: 20px; }
        .header-nav a { text-decoration: none; color: var(--text-main); font-size: 14px; font-weight: bold; }
        .header-cta-top { background: var(--accent-orange); color: #fff !important; padding: 8px 15px; border-radius: 4px; }

        /* --- ファーストビュー --- */
        .fv { padding: 40px 20px; max-width: 1100px; margin: 0 auto; display: flex; flex-wrap: wrap; }
        
        /* 左側：コピー & キャラクター */
        .fv-left { flex: 1; min-width: 350px; padding-top: 20px; }
        .fv-sub-copy { color: #d68500; font-weight: bold; font-size: 1rem; margin-bottom: 10px; }
        .fv-main-copy { color: var(--primary-blue); font-size: 2.6rem; font-weight: bold; line-height: 1.2; margin-bottom: 20px; }
        .fv-description { font-size: 1rem; color: #555; margin-bottom: 30px; }

        .char-box { margin-bottom: 30px; }
        .char-img { width: 140px; }

        /* 右側：ステップフロー（画像再現） */
        .fv-right { flex: 1.2; min-width: 500px; background: #fff; padding: 20px; }
        .step-flow-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
        
        .step-label { grid-column: span 3; font-size: 0.85rem; font-weight: bold; color: #666; margin: 15px 0 5px; text-align: left; padding-left: 5px; }
        .step-label:first-child { margin-top: 0; }

        /* 縦列 */
        .flow-col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        
        /* BOX要素 */
        .box-form { background: var(--step-bg); border-radius: 8px; width: 100%; min-height: 50px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; }
        .arrow-v { color: #ccc; font-size: 0.9rem; margin: 2px 0; }

        /* メールスタック */
        .mail-stack { display: flex; flex-direction: column; gap: 4px; width: 100%; }
        .mail-box { padding: 8px; border-radius: 4px; color: #fff; font-size: 0.9rem; }
        .m-blue { background: #4a82e8; }
        .m-light { background: #eef5ff; color: #4a82e8; border: 1px solid #ddecff; }
        .m-orange { background: #ff9933; }

        /* 握手アイコン（代替） */
        .success-icon { font-size: 2.5rem; margin-top: 10px; }
        .icon-blue { color: #4a82e8; }
        .icon-gray { color: #ddd; }
        .icon-orange { color: #ff9933; }

        /* CTAボタン */
        .cta-group { display: flex; gap: 15px; margin-top: 20px; }
        .btn-cta { flex: 1; padding: 18px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 1.1rem; text-align: center; border: none; transition: 0.2s; }
        .btn-primary { background: var(--primary-blue); color: #fff; }
        .btn-secondary { border: 2px solid var(--primary-blue); color: var(--primary-blue); background: #fff; }
        .btn-cta:hover { opacity: 0.8; transform: translateY(-2px); }

        @media (max-width: 768px) {
            .fv { flex-direction: column; }
            .fv-left { min-width: 100%; text-align: center; }
            .fv-right { min-width: 100%; padding: 20px 0; }
            .fv-main-copy { font-size: 2rem; }
            .cta-group { flex-direction: column; }
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-container">
            <div class="header-logo">
                <a href="https://www.meruhaikun.com/"><img src="https://www.meruhaikun.com/common/img/logo.png" alt="める配くん"></a>
            </div>
            <nav class="header-nav">
                <a href="https://www.meruhaikun.com/trial/" class="header-cta-top">無料トライアル</a>
            </nav>
        </div>
    </header>

    <main class="fv">
        <div class="fv-left">
            <div class="fv-sub-copy">累計2500社の実績を誇る「める配くん」から、待望の新プラン誕生！</div>
            <h1 class="fv-main-copy">その「見込み客」、<br>プロプランなら<br>「本顧客」まで導ける。</h1>
            <p class="fv-description">複数の入り口（フォーム） × 自動追客（ステップメール）で、「売れるチャンス」を自動でつくります</p>
            
            <div class="char-box">
                <img src="https://inabat-tech.github.io/meruhai_ep_page/sampo_speaker.png" alt="キャラクター" class="char-img">
            </div>

            <div class="cta-group">
                <a href="https://www.meruhaikun.com/trial/" class="btn-cta btn-primary">今すぐ無料で始める</a>
                <a href="#" class="btn-cta btn-secondary">オンラインMtg予約</a>
            </div>
        </div>

        <div class="fv-right">
            <div class="step-flow-grid">
                <div class="step-label">Step1 フォーム作成（集める）</div>
                <div class="flow-col">
                    <div class="box-form">資料請求<br>フォーム</div>
                    <div class="arrow-v"><i class="fa-solid fa-chevron-down"></i></div>
                </div>
                <div class="flow-col">
                    <div class="box-form">セミナー<br>フォーム</div>
                    <div class="arrow-v"><i class="fa-solid fa-chevron-down"></i></div>
                </div>
                <div class="flow-col">
                    <div class="box-form">お問合せ<br>フォーム</div>
                    <div class="arrow-v"><i class="fa-solid fa-chevron-down"></i></div>
                </div>

                <div class="step-label">Step2 ステップメール（育てる）</div>
                <div class="flow-col">
                    <div class="mail-stack">
                        <div class="mail-box m-blue"><i class="fa-solid fa-envelope"></i></div>
                        <div class="mail-box m-blue"><i class="fa-solid fa-envelope"></i></div>
                        <div class="mail-box m-blue"><i class="fa-solid fa-envelope"></i></div>
                    </div>
                    <div class="arrow-v"><i class="fa-solid fa-chevron-down"></i></div>
                </div>
                <div class="flow-col">
                    <div class="mail-stack">
                        <div class="mail-box m-light"><i class="fa-solid fa-envelope"></i></div>
                        <div class="mail-box m-light"><i class="fa-solid fa-envelope"></i></div>
                        <div class="mail-box m-light"><i class="fa-solid fa-envelope"></i></div>
                    </div>
                    <div class="arrow-v"><i class="fa-solid fa-chevron-down"></i></div>
                </div>
                <div class="flow-col">
                    <div class="mail-stack">
                        <div class="mail-box m-orange"><i class="fa-solid fa-envelope"></i></div>
                        <div class="mail-box m-orange"><i class="fa-solid fa-envelope"></i></div>
                        <div class="mail-box m-orange"><i class="fa-solid fa-envelope"></i></div>
                    </div>
                    <div class="arrow-v"><i class="fa-solid fa-chevron-down"></i></div>
                </div>

                <div class="step-label">Step3 本顧客へ</div>
                <div class="flow-col">
                    <div class="success-icon icon-blue"><i class="fa-solid fa-handshake"></i></div>
                    <div style="font-size: 0.7rem; font-weight: bold;">成約へ</div>
                </div>
                <div class="flow-col">
                    <div class="success-icon icon-gray"><i class="fa-solid fa-handshake"></i></div>
                </div>
                <div class="flow-col">
                    <div class="success-icon icon-orange"><i class="fa-solid fa-handshake"></i></div>
                </div>
            </div>
        </div>
    </main>

    <footer style="background:#333; color:#fff; text-align:center; padding: 20px; font-size: 0.8rem; margin-top: 50px;">
        &copy; delightful Inc. All Rights Reserved.
    </footer>

</body>
</html>
